<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intern Quiz — Haven256</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Garamond:ital,wght@0,400;0,700&family=Calibri:ital,wght@0,400;0,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #C9A227;
            --dark-navy: rgba(13, 21, 38, 0.92);
            --navy: rgba(27, 42, 74, 0.8);
            --cream: rgba(240, 235, 224, 0.95);
            --cream-light: rgba(240, 235, 224, 0.7);
            --cream-subtle: rgba(240, 235, 224, 0.5);
            --serif: 'Garamond', serif;
            --sans: 'Calibri', 'Segoe UI', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--sans);
            color: var(--cream);
            background: var(--dark-navy);
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            background: var(--dark-navy);
            border-bottom: 1px solid rgba(201, 162, 39, 0.2);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        nav a {
            text-decoration: none;
            color: var(--cream);
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
        }

        nav a:hover {
            color: var(--gold);
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gold);
            transition: width 0.3s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Header */
        .header {
            padding: 3rem 2rem;
            background: linear-gradient(135deg, var(--dark-navy) 0%, var(--navy) 100%);
            text-align: center;
            border-bottom: 2px solid var(--gold);
        }

        .header-brand {
            font-family: var(--serif);
            font-size: 1.2rem;
            color: var(--gold);
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .header h1 {
            font-family: var(--serif);
            font-size: 2.5rem;
            color: var(--cream);
            margin-bottom: 0.5rem;
            font-weight: 700;
            line-height: 1.1;
        }

        .header p {
            font-size: 1rem;
            color: var(--cream-light);
            font-style: italic;
        }

        /* Content Container */
        .content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        /* Google Form Container */
        .form-container {
            background: var(--navy);
            border: 1px solid rgba(201, 162, 39, 0.2);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        iframe {
            width: 100%;
            height: 800px;
            border: none;
            display: block;
        }

        /* Back Link */
        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--cream);
        }

        footer {
            background: var(--navy);
            padding: 2rem;
            text-align: center;
            color: var(--cream-light);
            font-size: 0.9rem;
            border-top: 1px solid rgba(201, 162, 39, 0.2);
            margin-top: 4rem;
        }

        footer strong {
            color: var(--cream);
        }

        /* Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .content {
            animation: fadeInUp 0.6s ease;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html#cost-analysis">Cost Analysis</a></li>
            <li><a href="index.html#intern-jd">Intern JD</a></li>
            <li><a href="index.html#finance-jd">Finance JD</a></li>
            <li><a href="index.html#ai-101">AI 101</a></li>
            <li><a href="index.html#quiz">Intern Quiz</a></li>
        </ul>
    </nav>

    <div class="header">
        <div class="header-brand">Haven256</div>
        <h1>Intern Assessment Quiz</h1>
        <p>Evaluate your understanding of the internship program and AI fundamentals</p>
    </div>

    <div class="content">
        <a href="index.html" class="back-link">← Back to Program Overview</a>
        <div class="form-container">
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdi5Ii_VVaIFyiZj2WJHadATfm4naoUrQkkIBJsYOBvk0HpwA/viewform?embedded=true" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </div>

    <footer>
        <p><strong>Haven256</strong> · Intern Program Documentation · Summer 2026 · Confidential</p>
    </footer>
</body>
</html>
